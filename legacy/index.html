<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Space Scape Visualisations</title>
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #090909; }
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #B6895B; font-family: ui-monospace, monospace; letter-spacing: .3em; font-size: 12px;
    }
  </style>

  <!-- React + Babel from CDN (no build step needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <div id="boot">LOADING…</div>

  <script>
    (async () => {
      const boot = document.getElementById("boot");
      try {
        const src = await (await fetch("./SpaceScape.jsx", { cache: "no-store" })).text();

        // The .jsx file is an ES module; strip module syntax so it can run
        // inside a classic Babel-transformed script with React provided in scope.
        const cleaned = src
          .replace(/^\s*import[^\n]*\n/gm, "")
          .replace(/export\s+default\s+function\s+App/, "function App");

        const out = Babel.transform(cleaned, { presets: ["react"] }).code;

        const factory = new Function(
          "React", "useState", "useEffect", "useRef", "useCallback", "useMemo", "useLayoutEffect",
          out + "\nreturn App;"
        );
        const App = factory(
          React, React.useState, React.useEffect, React.useRef,
          React.useCallback, React.useMemo, React.useLayoutEffect
        );

        boot.remove();
        ReactDOM.createRoot(document.getElementById("root"))
          .render(React.createElement(App));
      } catch (err) {
        boot.textContent = "FAILED: " + err.message;
        console.error(err);
      }
    })();
  </script>
</body>
</html>
